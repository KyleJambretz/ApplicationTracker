<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        /* ── Reset & base ───────────────────────────────────────────── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f7f5f2;
            --surface: #ffffff;
            --border: #e4e0da;
            --text: #1a1814;
            --muted: #8a8580;
            --accent: #1a1814;
            --applied: #d4e4f7;
            --applied-t: #1a3a5c;
            --interview: #fef3cd;
            --interview-t: #5c3d00;
            --offer: #d1f0e0;
            --offer-t: #0d4a28;
            --rejected: #fde0e0;
            --rejected-t: #5c1a1a;
            --declined: #ede0fd;
            --declined-t: #3a1a5c;
        }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 3rem 1.5rem;
        }

        /* ── Layout ─────────────────────────────────────────────────── */
        .page {
            max-width: 860px;
            margin: 0 auto;
        }

        /* ── Header ─────────────────────────────────────────────────── */
        header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .wordmark {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            line-height: 1;
            letter-spacing: -0.02em;
        }

            .wordmark span {
                color: var(--muted);
                font-size: 0.8rem;
                font-family: 'DM Mono', monospace;
                display: block;
                margin-top: 0.3rem;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

        /* ── Controls bar ───────────────────────────────────────────── */
        .controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.4rem 0.9rem;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.15s;
        }

            .filter-btn:hover,
            .filter-btn.active {
                background: var(--accent);
                color: #fff;
                border-color: var(--accent);
            }

        .spacer {
            flex: 1;
        }

        .btn-add {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            padding: 0.5rem 1.2rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: opacity 0.15s;
        }

            .btn-add:hover {
                opacity: 0.75;
            }

        /* ── Stats row ──────────────────────────────────────────────── */
        .stats {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .stat-value {
            font-family: 'DM Serif Display', serif;
            font-size: 1.6rem;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ── Application list ───────────────────────────────────────── */
        #app-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .app-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.1rem 1.4rem;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.5rem 1rem;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
            }
        }

        .app-card:hover {
            border-color: var(--accent);
        }

        .app-main {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .app-company {
            font-family: 'DM Serif Display', serif;
            font-size: 1.05rem;
        }

        .app-meta {
            font-size: 0.7rem;
            color: var(--muted);
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .app-actions {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        /* ── Status badge ───────────────────────────────────────────── */
        .badge {
            font-size: 0.62rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.25rem 0.6rem;
            border-radius: 2px;
            white-space: nowrap;
        }

        .badge-Applied {
            background: var(--applied);
            color: var(--applied-t);
        }

        .badge-InterviewScheduled {
            background: var(--interview);
            color: var(--interview-t);
        }

        .badge-OfferReceived {
            background: var(--offer);
            color: var(--offer-t);
        }

        .badge-Rejected {
            background: var(--rejected);
            color: var(--rejected-t);
        }

        .badge-Declined {
            background: var(--declined);
            color: var(--declined-t);
        }

        /* ── Icon buttons ───────────────────────────────────────────── */
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            font-size: 0.85rem;
            padding: 0.2rem;
            transition: color 0.15s;
            line-height: 1;
        }

            .icon-btn:hover {
                color: var(--text);
            }

            .icon-btn.del:hover {
                color: #c0392b;
            }

        /* ── Empty state ────────────────────────────────────────────── */
        .empty {
            text-align: center;
            padding: 4rem 0;
            color: var(--muted);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        /* ── Modal ──────────────────────────────────────────────────── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(26,24,20,0.45);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

            .overlay.open {
                display: flex;
            }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 480px;
            padding: 2rem;
            animation: fadeIn 0.18s ease;
        }

        .modal-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }

        label {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        input, select, textarea {
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            padding: 0.55rem 0.75rem;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            border-radius: 2px;
            outline: none;
            transition: border-color 0.15s;
            width: 100%;
        }

            input:focus, select:focus, textarea:focus {
                border-color: var(--accent);
            }

        textarea {
            resize: vertical;
            min-height: 70px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.6rem;
            margin-top: 1.5rem;
        }

        .btn-cancel {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            background: none;
            color: var(--muted);
            border-radius: 2px;
            cursor: pointer;
        }

            .btn-cancel:hover {
                color: var(--text);
                border-color: var(--text);
            }

        .btn-save {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            padding: 0.5rem 1.2rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 2px;
            cursor: pointer;
        }

            .btn-save:hover {
                opacity: 0.75;
            }

        /* ── Toast ──────────────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent);
            color: #fff;
            font-size: 0.75rem;
            padding: 0.7rem 1.2rem;
            border-radius: 2px;
            opacity: 0;
            transform: translateY(6px);
            transition: all 0.2s;
            pointer-events: none;
            z-index: 200;
        }

            .toast.show {
                opacity: 1;
                transform: none;
            }
    </style>
</head>
<body>
    <div class="page">

        <header>
            <div class="wordmark">
                Job Tracker
                <span>Application status board</span>
            </div>
        </header>

        <div class="stats" id="stats"></div>

        <div class="controls">
            <button class="filter-btn active" data-filter="">All</button>
            <button class="filter-btn" data-filter="Applied">Applied</button>
            <button class="filter-btn" data-filter="InterviewScheduled">Interview</button>
            <button class="filter-btn" data-filter="OfferReceived">Offer</button>
            <button class="filter-btn" data-filter="Rejected">Rejected</button>
            <button class="filter-btn" data-filter="Declined">Declined</button>
            <div class="spacer"></div>
            <button class="btn-add" onclick="openModal()">+ Add application</button>
        </div>

        <div id="app-list"></div>

    </div>

    <!-- ── Modal ─────────────────────────────────────────────────────── -->
    <div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
        <div class="modal">
            <div class="modal-title" id="modal-title">New application</div>
            <input type="hidden" id="edit-id" />

            <div class="field">
                <label>Company *</label>
                <input id="f-company" placeholder="Acme Corp" />
            </div>
            <div class="field">
                <label>Job title *</label>
                <input id="f-title" placeholder="Software Engineer" />
            </div>
            <div class="field">
                <label>Job URL</label>
                <input id="f-url" placeholder="https://..." />
            </div>
            <div class="field">
                <label>Status</label>
                <select id="f-status">
                    <option value="Applied">Applied</option>
                    <option value="InterviewScheduled">Interview Scheduled</option>
                    <option value="OfferReceived">Offer Received</option>
                    <option value="Rejected">Rejected</option>
                    <option value="Declined">Declined</option>
                </select>
            </div>
            <div class="field">
                <label>Applied date</label>
                <input id="f-date" type="date" />
            </div>
            <div class="field">
                <label>Notes</label>
                <textarea id="f-notes" placeholder="Any context..."></textarea>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="saveApplication()">Save</button>
            </div>
        </div>
    </div>

    <!-- ── Notes modal ────────────────────────────────────────────────── -->
    <div class="overlay" id="notes-overlay" onclick="handleNotesOverlayClick(event)">
        <div class="modal">
            <div class="modal-title" id="notes-modal-title">Notes</div>
            <p id="notes-modal-body" style="font-size:0.85rem;line-height:1.7;white-space:pre-wrap;color:var(--text);"></p>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeNotes()">Close</button>
            </div>
        </div>
    </div>

    <!-- ── Toast ──────────────────────────────────────────────────────── -->
    <div class="toast" id="toast"></div>

    <script>
        // ── Config ──────────────────────────────────────────────────────
        const API = '/api/jobapplications';

        // ── State ───────────────────────────────────────────────────────
        let applications = [];
        let activeFilter = '';

        // ── Boot ────────────────────────────────────────────────────────
        fetchApplications();

        // ── Fetch & render ──────────────────────────────────────────────
        async function fetchApplications() {
            try {
                const url = activeFilter ? `${API}?status=${activeFilter}` : API;
                const res = await fetch(url);
                if (!res.ok) throw new Error();
                applications = await res.json();
                render();
            } catch {
                toast('Could not reach API — is the server running?');
            }
        }

        function render() {
            renderStats();
            renderList();
        }

        function renderStats() {
            const total = applications.length;
            const interviews = applications.filter(a => a.status === 'InterviewScheduled').length;
            const offers = applications.filter(a => a.status === 'OfferReceived').length;

            document.getElementById('stats').innerHTML = `
          <div class="stat"><div class="stat-value">${total}</div><div class="stat-label">Total</div></div>
          <div class="stat"><div class="stat-value">${interviews}</div><div class="stat-label">Interviews</div></div>
          <div class="stat"><div class="stat-value">${offers}</div><div class="stat-label">Offers</div></div>
        `;
        }

        function renderList() {
            const list = document.getElementById('app-list');

            if (!applications.length) {
                list.innerHTML = `<div class="empty">No applications yet — add one above.</div>`;
                return;
            }

            list.innerHTML = applications.map(a => `
          <div class="app-card">
            <div class="app-main">
              <div class="app-company">${esc(a.companyName)} &mdash; <em style="font-style:normal;color:var(--muted)">${esc(a.jobTitle)}</em></div>
              <div class="app-meta">
                <span>${formatDate(a.appliedDate)}</span>
                ${a.jobUrl ? `<a href="${safeUrl(a.jobUrl)}" target="_blank" style="color:var(--muted);text-decoration:none;">↗ listing</a>` : ''}
                ${a.notes ? `<button onclick="openNotes(${a.id})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-family:'DM Mono',monospace;font-size:0.7rem;padding:0;">📝 notes</button>` : ''}
              </div>
            </div>
            <div class="app-actions">
              <span class="badge badge-${a.status}">${formatStatus(a.status)}</span>
              <button class="icon-btn" title="Edit" onclick="openEdit(${a.id})">✎</button>
              <button class="icon-btn del" title="Delete" onclick="deleteApplication(${a.id})">✕</button>
            </div>
          </div>
        `).join('');
        }

        // ── Filtering ───────────────────────────────────────────────────
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilter = btn.dataset.filter;
                fetchApplications();
            });
        });

        // ── Notes modal ─────────────────────────────────────────────────
        function openNotes(id) {
            const a = applications.find(x => x.id === id);
            if (!a) return;
            document.getElementById('notes-modal-title').textContent = `${a.companyName} — notes`;
            document.getElementById('notes-modal-body').textContent = a.notes ?? '';
            document.getElementById('notes-overlay').classList.add('open');
        }

        function closeNotes() {
            document.getElementById('notes-overlay').classList.remove('open');
        }

        function handleNotesOverlayClick(e) {
            if (e.target === document.getElementById('notes-overlay')) closeNotes();
        }

        // ── Modal helpers ───────────────────────────────────────────────
        function openModal() {
            document.getElementById('modal-title').textContent = 'New application';
            document.getElementById('edit-id').value = '';
            document.getElementById('f-company').value = '';
            document.getElementById('f-title').value = '';
            document.getElementById('f-url').value = '';
            document.getElementById('f-status').value = 'Applied';
            document.getElementById('f-date').value = today();
            document.getElementById('f-notes').value = '';
            document.getElementById('overlay').classList.add('open');
            document.getElementById('f-company').focus();
        }

        function openEdit(id) {
            const a = applications.find(x => x.id === id);
            if (!a) return;
            document.getElementById('modal-title').textContent = 'Edit application';
            document.getElementById('edit-id').value = a.id;
            document.getElementById('f-company').value = a.companyName;
            document.getElementById('f-title').value = a.jobTitle;
            document.getElementById('f-url').value = a.jobUrl || '';
            document.getElementById('f-status').value = a.status;
            document.getElementById('f-date').value = a.appliedDate.split('T')[0];
            document.getElementById('f-notes').value = a.notes || '';
            document.getElementById('overlay').classList.add('open');
        }

        function closeModal() {
            document.getElementById('overlay').classList.remove('open');
        }

        function handleOverlayClick(e) {
            if (e.target === document.getElementById('overlay')) closeModal();
        }

        // ── Save (create or update) ─────────────────────────────────────
        async function saveApplication() {
            const id = document.getElementById('edit-id').value;
            const company = document.getElementById('f-company').value.trim();
            const title = document.getElementById('f-title').value.trim();

            if (!company || !title) { toast('Company and job title are required.'); return; }

            const body = {
                companyName: company,
                jobTitle: title,
                jobUrl: document.getElementById('f-url').value.trim() || null,
                status: document.getElementById('f-status').value,
                appliedDate: new Date(document.getElementById('f-date').value).toISOString(),
                notes: document.getElementById('f-notes').value.trim() || null,
            };

            try {
                const res = await fetch(id ? `${API}/${id}` : API, {
                    method: id ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (!res.ok) throw new Error();
                closeModal();
                toast(id ? 'Application updated.' : 'Application added.');
                fetchApplications();
            } catch {
                toast('Save failed — check the console.');
            }
        }

        // ── Delete ──────────────────────────────────────────────────────
        async function deleteApplication(id) {
            if (!confirm('Remove this application?')) return;
            try {
                const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error();
                toast('Application removed.');
                fetchApplications();
            } catch {
                toast('Delete failed.');
            }
        }

        // ── Utilities ───────────────────────────────────────────────────
        function safeUrl(url) {
            if (!url) return '#';
            return /^https?:\/\//i.test(url) ? esc(url) : esc('https://' + url);
        }

        function esc(str) {
            return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function today() {
            return new Date().toISOString().split('T')[0];
        }

        function formatDate(iso) {
            return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function formatStatus(s) {
            return { Applied: 'Applied', InterviewScheduled: 'Interview', OfferReceived: 'Offer', Rejected: 'Rejected', Declined: 'Declined' }[s] ?? s;
        }

        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2800);
        }
    </script>
</body>
</html>
